<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Calculator</title>
  <style>
    body {
      font-family: Arial;
      max-width: 900px;
      margin: 40px auto;
    }
    input {
      margin-bottom: 10px;
      display: block;
      width: 100%;
      padding: 5px;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #f4f4f4;
    }
    .bold {
      font-weight: bold;
      margin-top: 20px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h2>Investment Calculator</h2>

  <label>Initial Investment (USD):</label>
  <input type="number" id="initialInvestment" />

  <label>Daily Return (%):</label>
  <input type="number" id="dailyReturn" />

  <label>Days:</label>
  <input type="number" id="days" />

  <label>USD to INR Conversion Rate:</label>
  <input type="number" id="usdToInr" step="0.01" />

  <label>Extra Investment every 20 days (USD):</label>
  <input type="number" id="extraInvestment" />

  <button onclick="calculate()">Calculate</button>

  <div id="results" class="bold"></div>
  <div id="table"></div>

  <script>
    function calculate() {
      const principal = parseFloat(document.getElementById('initialInvestment').value);
      const rate = parseFloat(document.getElementById('dailyReturn').value) / 100;
      const n = parseInt(document.getElementById('days').value);
      const conversionRate = parseFloat(document.getElementById('usdToInr').value);
      const additional = parseFloat(document.getElementById('extraInvestment').value) || 0;

      if (isNaN(principal) || isNaN(rate) || isNaN(n)) {
        document.getElementById('results').innerText = 'Please enter valid numbers.';
        document.getElementById('table').innerHTML = '';
        return;
      }

      let currentAmount = principal;
      let totalInvested = principal;
      const today = new Date();
      const rows = [];

      for (let i = 1; i <= n; i++) {
        if (i % 20 === 0) {
          currentAmount += additional;
          totalInvested += additional;
        }

        const interest = currentAmount * rate;
        currentAmount += interest;

        const entryDate = new Date(today);
        entryDate.setDate(today.getDate() + i - 1);
        const dateStr = entryDate.toISOString().split('T')[0];

        rows.push(`
          <tr>
            <td>${i}</td>
            <td>${dateStr}</td>
            <td>${(currentAmount - interest).toFixed(2)}</td>
            <td>${interest.toFixed(2)}</td>
            <td>${currentAmount.toFixed(2)}</td>
          </tr>
        `);
      }

      const totalReturn = currentAmount - totalInvested;
      const taxUSD = totalReturn * 0.3;
      const afterTax = currentAmount - taxUSD;
      const taxINR = isNaN(conversionRate) ? null : (taxUSD * conversionRate).toFixed(2);
      const inrAmount = isNaN(conversionRate) ? null : (afterTax * conversionRate).toFixed(2);
      const returnAfterTaxUSD = totalReturn - taxUSD;
      const returnAfterTaxINR = isNaN(conversionRate) ? null : (returnAfterTaxUSD * conversionRate).toFixed(2);

      let resultText = `Final Amount after ${n} days: $${currentAmount.toFixed(2)}\n`;
      resultText += `Amount after 30% Tax on Returns: $${afterTax.toFixed(2)}\n`;
      if (inrAmount) resultText += `Amount in INR (after tax): ₹${inrAmount}\n\n`;
      resultText += `Tax Paid: $${taxUSD.toFixed(2)} | ₹${taxINR}\n`;
      resultText += `Return after Tax: $${returnAfterTaxUSD.toFixed(2)} | ₹${returnAfterTaxINR}`;

      document.getElementById('results').innerText = resultText;

      document.getElementById('table').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Day</th>
              <th>Date</th>
              <th>Today's Amount Invested ($)</th>
              <th>Today's Return ($)</th>
              <th>Total Amount ($)</th>
            </tr>
          </thead>
          <tbody>${rows.join('')}</tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
